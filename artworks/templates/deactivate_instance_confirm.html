{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2>Deactivate Artwork Instance</h2>
    <div class="alert alert-warning mt-4">
        <strong>Are you sure you want to deactivate this instance?</strong><br>
        Instance ID: {{ instance.firestore_collection_id }}<br>
        Template: {{ instance.template.title }} ({{ instance.version }})
    </div>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Deactivate Instance</button>
        <a href="{% url 'versions' %}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>
{% endblock %}
