{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">Create Artwork Instance</h2>
    {% if error_message %}
        <div class="alert alert-danger">{{ error_message|safe }}</div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Create Instance</button>
    </form>
</div>
{% endblock %}
