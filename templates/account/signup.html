{% extends "base.html" %}
{% block content %}
<div class="container mt-5" style="max-width: 400px;">
    <h2 class="mb-4">Sign Up</h2>
    {% if form.errors %}
        <div class="alert alert-danger">
            Please correct the errors below.
        </div>
    {% endif %}
    <form method="post" action="">
        {% csrf_token %}
        <div class="mb-3">
            <label for="id_email" class="form-label">Email</label>
            <input type="email" name="email" required class="form-control" id="id_email">
        </div>
        <div class="mb-3">
            <label for="id_username" class="form-label">Username</label>
            <input type="text" name="username" autofocus required class="form-control" id="id_username">
        </div>
        <div class="mb-3">
            <label for="id_password1" class="form-label">Password</label>
            <input type="password" name="password1" required class="form-control" id="id_password1" autocomplete="new-password">
        </div>
        <div class="mb-3">
            <label for="id_password2" class="form-label">Confirm Password</label>
            <input type="password" name="password2" required class="form-control" id="id_password2" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign Up</button>
    </form>
    <div class="mt-3 text-center">
        <a href="{% url 'login' %}">Already have an account? Login</a>
    </div>
</div>
{% endblock %}
