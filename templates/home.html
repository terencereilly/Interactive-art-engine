{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSG</title>
    <link rel="icon" type="image/png" href="{% static 'assets/images/favicon.png' %}">
    <!-- Preconnect to iframe source -->
    <link rel="preconnect" href="https://msg-nu-ashen.vercel.app">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- <link rel="stylesheet" href=""> -->
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">

</head>

<body>

    <!-- Navigation -->
    <header class="modern-header">
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                    <div class="row w-100">
                        <div class="col-12 col-md-auto">
                            <a class="navbar-brand space-grotesk-regular text-break" href="#" style="line-height:1.1; white-space:normal; word-break:break-word;">
                                <span style="display:block;font-size:2.2rem;font-weight:700;">Messages to the Future</span>
                                <span class="navbar-tagline d-block" style="font-size:1rem;font-weight:400;color:#666;margin-top:0.1rem;letter-spacing:0.01em; white-space:normal; word-break:break-word;">License &amp; run your own copy of this evolving interactive artwork</span>
                            </a>
                        </div>
                    </div>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mb-2 mb-lg-0 ms-auto d-flex align-items-center">
                        <li class="nav-item">
                            <a class="nav-link" href="#">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link disabled" aria-disabled="true">Licensing</a>
                        </li>
                        <li class="nav-item ms-lg-3">
                            <a href="/login/" class="btn btn-outline-primary">Login</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Fullscreen Iframe Section -->
    <div style="position:relative; width:100%; height:calc(100vh - 80px); min-height:300px; margin:0; padding:0;">
        <iframe id="myIframe"
            src="https://msg-nu-ashen.vercel.app/"
            allow="fullscreen; autoplay; camera; microphone; accelerometer; gyroscope; magnetometer; xr-spatial-tracking"
            loading="lazy"
            style="position:absolute; top:0; left:0; width:100%; height:100%; border:none; display:block; background:#000;"></iframe>
        <button id="fullscreenBtn" type="button" aria-label="Fullscreen" style="position:absolute; bottom:calc(15% - 10px); right:34px; z-index:20; background:rgba(255,255,255,0.85); border:none; border-radius:50%; width:48px; height:48px; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,0.15); cursor:pointer;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="#333" stroke-width="2" d="M4 8V4h4m8 0h4v4m0 8v4h-4m-8 0H4v-4"/></svg>
        </button>
    </div>

    <!-- Footer -->
        <footer class="container-fluid" style="position:fixed; bottom:0; left:0; width:100vw; background:rgba(255,255,255,0.85); z-index:1000; box-shadow:0 -2px 12px rgba(0,0,0,0.06);">
            <div class="row">
                <div class="col-12 d-flex justify-content-end align-items-center">
                    <a href="https://x.com/OltaArt" target="_blank" rel="noopener noreferrer" class="social-link"><i class="fa-brands fa-twitter social-icon"></i></a>
                    <a href="https://facebook.com" target="_blank" rel="noopener noreferrer" class="social-link"><i class="fa-brands fa-facebook social-icon"></i></a>
                    <a href="https://youtube.com" target="_blank" rel="noopener noreferrer" class="social-link"><i class="fa-brands fa-youtube social-icon"></i></a>
                </div>
            </div>
        </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- Font Awesome Kit -->
    <script src="https://kit.fontawesome.com/9fc19e8b68.js" crossorigin="anonymous"></script>

    <!-- //////////////////////////////////////////////////////////////////////////// -->
   <script>
        function toggleFullscreen(btn) {
            const iframe = document.getElementById('myIframe');
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            }
        }




        // Show iframe when loaded, hide loader
        document.addEventListener('DOMContentLoaded', function() {
            const iframe = document.getElementById('myIframe');
            const loader = document.getElementById('iframeLoader');
            iframe.addEventListener('load', function() {
                if (loader) loader.style.display = 'none';
                iframe.style.display = 'block';
            });
        });
    </script>


</body>

</html>
