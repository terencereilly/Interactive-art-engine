
{% extends "base.html" %}
{% block content %}
<style>
    body, html {
        overflow: hidden !important;
        height: 100%;
        background: #fff !important;
        margin: 0 !important;
        padding: 0 !important;
        border-radius: 0 !important;
        box-shadow: none !important;
    }
    #myIframe {
        position: fixed !important;
        left: 2vw !important;
        width: 96vw !important;
        border: none !important;
        display: block !important;
        background: #fff !important;
        z-index: 1 !important;
        margin: 0 !important;
        padding: 0 !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        /* Height and top will be set dynamically */
    }
    @media (max-width: 600px) {
        #myIframe {
            left: 0 !important;
            width: 100vw !important;
        }
    }

</style>
<iframe id="myIframe"
    src="https://msg-nu-ashen.vercel.app/"
    allow="fullscreen; autoplay; camera; microphone; accelerometer; gyroscope; magnetometer; xr-spatial-tracking"
    loading="lazy">
</iframe>

<script>
    function toggleFullscreen(btn) {
        const iframe = document.getElementById('myIframe');
        if (iframe.requestFullscreen) {
            iframe.requestFullscreen();
        }
    }
    // Dynamically set iframe height to fill between header and footer
    function resizeIframe() {
        const header = document.querySelector('header');
        const footer = document.querySelector('footer');
        const iframe = document.getElementById('myIframe');
        if (header && footer && iframe) {
            const headerHeight = header.offsetHeight;
            const footerHeight = footer.offsetHeight;
            const windowHeight = window.innerHeight;
            iframe.style.top = headerHeight + 'px';
            iframe.style.height = (windowHeight - headerHeight - footerHeight) + 'px';
        }
    }
    window.addEventListener('resize', resizeIframe);
    document.addEventListener('DOMContentLoaded', function() {
        resizeIframe();
        const iframe = document.getElementById('myIframe');
        const loader = document.getElementById('iframeLoader');
        iframe.addEventListener('load', function() {
            if (loader) loader.style.display = 'none';
            iframe.style.display = 'block';
        });
    });
</script>
{% endblock %}
