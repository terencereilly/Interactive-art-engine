
{% extends "base.html" %}
{% block content %}
<style>
    body, html {
        overflow: hidden !important;
        height: 100%;
        background: #fff !important;
        margin: 0 !important;
        padding: 0 !important;
        border-radius: 0 !important;
        box-shadow: none !important;
    }
    #myIframe {
        position: fixed !important;
        left: 2vw !important;
        width: 96vw !important;
        border: none !important;
        display: block !important;
        background: #fff !important;
        z-index: 1 !important;
        margin: 0 !important;
        padding: 0 !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        /* Height and top will be set dynamically */
    }
    @media (max-width: 600px) {
        #myIframe {
            left: 0 !important;
            width: 100vw !important;
        }
    }
    #fullscreenBtn {
        position: absolute;
        bottom: 13vh;
        right: 32px;
        z-index: 2100;
        background: rgba(232, 232, 232, 0.85);
        border: none;
        border-radius: 50%;
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        cursor: pointer;
        transition: background 0.2s;
    }
    #fullscreenBtn:active {
        background: #e0e0e0;
    }
    @media (max-width: 600px) {
        #fullscreenBtn {
            bottom: 16px;
            right: 16px;
            width: 40px;
            height: 40px;
        }
    }
</style>
<iframe id="myIframe"
    src="https://msg-nu-ashen.vercel.app/"
    allow="fullscreen; autoplay; camera; microphone; accelerometer; gyroscope; magnetometer; xr-spatial-tracking"
    loading="lazy">
</iframe>
<button id="fullscreenBtn" type="button" aria-label="Fullscreen">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="#333" stroke-width="2" d="M4 8V4h4m8 0h4v4m0 8v4h-4m-8 0H4v-4"/></svg>
</button>
<script>
    function toggleFullscreen(btn) {
        const iframe = document.getElementById('myIframe');
        if (iframe.requestFullscreen) {
            iframe.requestFullscreen();
        }
    }
    // Dynamically set iframe height to fill between header and footer
    function resizeIframe() {
        const header = document.querySelector('header');
        const footer = document.querySelector('footer');
        const iframe = document.getElementById('myIframe');
        if (header && footer && iframe) {
            const headerHeight = header.offsetHeight;
            const footerHeight = footer.offsetHeight;
            const windowHeight = window.innerHeight;
            iframe.style.top = headerHeight + 'px';
            iframe.style.height = (windowHeight - headerHeight - footerHeight) + 'px';
        }
    }
    window.addEventListener('resize', resizeIframe);
    document.addEventListener('DOMContentLoaded', function() {
        resizeIframe();
        const iframe = document.getElementById('myIframe');
        const loader = document.getElementById('iframeLoader');
        iframe.addEventListener('load', function() {
            if (loader) loader.style.display = 'none';
            iframe.style.display = 'block';
        });
    });
</script>
{% endblock %}
