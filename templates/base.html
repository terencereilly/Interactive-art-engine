<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Interactive Art Engine{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>
<body>
    <!-- Site-wide Header (from homepage) -->
    <header class="modern-header">
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <div class="row w-100">
                    <div class="col-12 col-md-auto">
                        <a class="navbar-brand space-grotesk-regular text-break" href="/" style="line-height:1.1; white-space:normal; word-break:break-word;">
                            <span style="display:block;font-size:2.2rem;font-weight:700;">Messages to the Future</span>
                            <span class="navbar-tagline d-block" style="font-size:1rem;font-weight:400;color:#666;margin-top:0.1rem;letter-spacing:0.01em; white-space:normal; word-break:break-word;">License &amp; run your own copy of this evolving interactive artwork</span>
                        </a>
                    </div>
                </div>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mb-2 mb-lg-0 ms-auto d-flex align-items-center">
                        <li class="nav-item">
                            <a class="nav-link" href="/about/">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/artworks/versions/">Browse Artworks</a>
                        </li>
                        {% if user.is_authenticated %}
                            <li class="nav-item ms-lg-3">
                                <a href="/dashboard/" class="btn btn-outline-primary me-2">Dashboard</a>
                            </li>
                            <li class="nav-item ms-lg-1">
                                <form method="post" action="/logout/" style="display:inline;">
                                    {% csrf_token %}
                                    <button type="submit" class="btn btn-outline-danger">Logout</button>
                                </form>
                            </li>
                        {% else %}
                            <li class="nav-item ms-lg-3">
                                <a href="/accounts/login/" class="btn btn-outline-primary me-2">Login</a>
                            </li>
                            <li class="nav-item ms-lg-1">
                                <a href="/accounts/signup/" class="btn btn-outline-success">Sign Up</a>
                            </li>
                        {% endif %}
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <!-- Footer (from homepage, now site-wide) -->
    <footer class="container-fluid" style="position:fixed; bottom:0; left:0; height: 100px; width:100vw; background:rgba(255,255,255,0.85); z-index:1000; box-shadow:0 -2px 12px rgba(0,0,0,0.06);">
        <div class="row">
            <div class="col-12 d-flex justify-content-end align-items-center">
                <a href="https://x.com/OltaArt" target="_blank" rel="noopener noreferrer" class="social-link"><i class="fa-brands fa-twitter social-icon"></i></a>
                <a href="https://facebook.com" target="_blank" rel="noopener noreferrer" class="social-link"><i class="fa-brands fa-facebook social-icon"></i></a>
                <a href="https://youtube.com" target="_blank" rel="noopener noreferrer" class="social-link"><i class="fa-brands fa-youtube social-icon"></i></a>
            </div>
        </div>
    </footer>
</body>
</html>
