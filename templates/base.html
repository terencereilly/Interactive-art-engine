<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Interactive Art Engine{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>
<body>
    <!-- Modern Header -->
    <header class="modern-header bg-primary text-white py-3 mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand text-white fw-bold fs-3" href="/">Interactive Art Engine</a>
            <nav>
                <a href="/dashboard/" class="text-white mx-2">Dashboard</a>
                <a href="/artworks/versions/" class="text-white mx-2">Browse Artworks</a>
                <a href="/logout/" class="text-white mx-2">Logout</a>
            </nav>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <!-- Footer -->
    <footer class="bg-light text-center py-3 mt-5 border-top">
        <div class="container">
            <span class="text-muted">&copy; 2026 Interactive Art Engine. All rights reserved.</span>
        </div>
    </footer>
</body>
</html>
